services:
  catalog:
    image: catalog:latest
    build: 
      context: sneakers-services
      dockerfile: Dockerfile.catalog
    container_name: catalog
    restart: unless-stopped
    ports: 
    - 38083:8080
    volumes:
        - ./sneakers-services/catalog/config.yaml:/config.yaml
    environment:
      - CATALOG_ADDRESS=:8080
      - DB_ADDRESS=postgres://postgres:password@postgres:5432/catalog_db?sslmode=disable
      - REDIS_ADDRESS=redis://:password@redis:6379/0
      - CACHE_TTL=3h
    depends_on:
        postgres:
          condition: service_healthy
        redis:
          condition: service_healthy

  auction:
    image: auction:latest
    build: 
      context: sneakers-services
      dockerfile: Dockerfile.auction
    container_name: auction
    restart: unless-stopped
    ports: 
    - 38082:8080
    volumes:
        - ./sneakers-services/auction/config.yaml:/config.yaml
    environment:
      - AUCTION_ADDRESS=:8080
      - NATS_ADDRESS=:nats://nats:4222
      - DB_ADDRESS=postgres://postgres:password@postgres:5432/auction_db?sslmode=disable
    depends_on:
        postgres:
          condition: service_healthy
        nats:
        condition: service_started

  notification_service:
    image: notification:latest
    build: 
      context: sneakers-services
      dockerfile: Dockerfile.notification
    container_name: auction
    restart: unless-stopped
    ports: 
    - 38083:8080
    environment:
    - NATS_ADDRESS=:nats://nats:4222
    depends_on:
      auction:
        condition: service_started
      nats:
        condition: service_started

  nats:
    image: nats
    container_name: nats
    ports:
      - "4222:4222"

  postgres:
    image: postgres:18
    container_name: postgres
    restart: unless-stopped
    ports:
      - 5432:5432
    environment:
      POSTGRES_PASSWORD: password
    volumes:
      - postgres:/var/lib/postgresql
      - ./database/init-postges.sql:/docker-entrypoint-initdb.d/init-db.sql 
    healthcheck:
      test: [ "CMD", "pg_isready" ]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin4
    restart: unless-stopped
    ports:
      - 18888:80
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@test.com
      PGADMIN_DEFAULT_PASSWORD: password
      PGADMIN_DISABLE_POSTFIX: "true"
    volumes:
      - pgadmin:/var/lib/pgadmin
    depends_on:
      - postgres

  redis:
    image: redis:8.6.2
    container_name: redis
    ports:
      - 6379:6379
    command: redis-server --requirepass password
    volumes:
      - redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "password", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    tty: true
    stdin_open: true

  redis-insight:
    image: redis/redisinsight:3.4
    container_name: redis-insight
    ports:
      - 5540:5540
    volumes:
      - redisinsight:/data
    depends_on:
      - redis

volumes:
  postgres:
  pgadmin:
  redis:
  redisinsight: