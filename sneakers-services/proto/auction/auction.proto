syntax = "proto3";

package auction;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "hotsneakers/proto/auction";

message Bid {
  int64 id = 1;
  int64 user_id = 2;
  int64 auction_id = 3;
  int64 amount = 4;
  google.protobuf.Timestamp created_at = 5;
}

message Auction {
  int64 id = 1;
  int64 sneaker_id = 2;
  int64 current_price = 3;
  google.protobuf.Timestamp end_at = 4;
}

message CreateAuctionReq {
  int64 sneaker_id = 1;
  int64 current_price = 2;
  google.protobuf.Timestamp end_at = 3;
}

message CreateAuctionResp {
  int64 auction_id = 1;
}

message GetAuctionDetailsReq {
  int64 auction_id = 1;
}

message GetAuctionDetailsResp {
  Auction auction = 1;
  repeated Bid bids = 2;
}

message MakeBidReq {
  int64 auction_id = 1;
  int64 user_id = 2;
  int64 amount = 3;
}

message MakeBidResp {
}

service AuctionService {
  rpc Ping(google.protobuf.Empty) returns (google.protobuf.Empty);

  rpc CreateAuction(CreateAuctionReq) returns (CreateAuctionResp);

  rpc GetAuctionDetails(GetAuctionDetailsReq) returns (GetAuctionDetailsResp);

  rpc MakeBid(MakeBidReq) returns (MakeBidResp);
}
