syntax = "proto3";

package catalog;

import "google/protobuf/empty.proto";

option go_package = "hotsneakers/proto/catalog";

message Sneaker {
  int64 id = 1;
  string brand = 2;
  string model = 3;
}

message CreateSneakerRequest {
  string brand = 1;
  string model = 2;
}

message CreateSneakerResponse{
  int64 id = 1;
}

message UpdateSneakerRequest {
  int64 id = 1;
  string brand = 2;
  string model = 3;
}

message UpdateSneakerResponse{

}

message GetAllSneakersRequest {

}

message GetAllSneakersResponse {
  repeated Sneaker sneakers = 1;
}

message GetSneakerByIDRequest {
  int64 id = 1;
}

message GetSneakerByIDResponse {
  Sneaker sneaker = 1;
}

service Catalog {
  rpc Ping(google.protobuf.Empty) returns (google.protobuf.Empty) {}

  rpc GetAllSneakers(GetAllSneakersRequest) returns (GetAllSneakersResponse) {}

  rpc GetSneakerByID(GetSneakerByIDRequest) returns (GetSneakerByIDResponse) {}

  rpc CreateSneaker(CreateSneakerRequest) returns (CreateSneakerResponse) {}

  rpc UpdateSneaker(UpdateSneakerRequest) returns (UpdateSneakerResponse) {}
}
